apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-cluster-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  k8s-cluster-dashboard.json: |
    {
      "title": "Kubernetes Cluster Health",
      "schemaVersion": 38,
      "version": 1,
      "panels": [
        {
          "type": "timeseries",
          "title": "Cluster CPU Usage",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\",container!=\"POD\"}[5m]))",
              "legendFormat": "CPU Usage"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Cluster Memory Usage",
          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes{container!=\"\",container!=\"POD\"})",
              "legendFormat": "Memory Usage"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod Count by Namespace",
          "targets": [
            {
              "expr": "count(kube_pod_info) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod Restarts",
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Network Traffic",
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total[5m]))",
              "legendFormat": "Receive"
            },
            {
              "expr": "sum(rate(container_network_transmit_bytes_total[5m]))",
              "legendFormat": "Transmit"
            }
          ]
        }
      ]
    }
